<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>الاعدادات الشخصية</title>
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div class="settings-container">

    <div class="settings-sidebar">
        <img src="assets/img/woman2.jpeg" class="profile-img">
        <h5 class="mt-2">بلسم مشاقي</h5>
        <p class="text-muted">Super Admin</p>

        <button class="btn-option active">البيانات الشخصية</button>
        <button class="btn-option">كلمة المرور</button>
        <button class="btn-option">تسجيل الخروج</button>
    </div>

    <div class="settings-content">
        <h4>البيانات الشخصية</h4>

        <div class="row mt-3 g-3">

            <div class="col-md-6">
                <label>الاسم الأول</label>
                <input class="form-control" value="بلسم">
            </div>

            <div class="col-md-6">
                <label>اسم العائلة</label>
                <input class="form-control" value="مشاقي">
            </div>

            <div class="col-md-6">
                <label>البريد الإلكتروني</label>
                <input class="form-control" value="example@gmail.com">
            </div>

            <div class="col-md-6">
                <label>رقم الهاتف</label>
                <input class="form-control" value="0590000000">
            </div>

            <div class="col-md-6">
                <label>العنوان</label>
                <input class="form-control" value="غزة - الرمال">
            </div>

            <div class="col-md-6">
                <label>تاريخ الميلاد</label>
                <input type="date" class="form-control" value="1995-02-01">
            </div>
        </div>

        <div class="mt-4 d-flex gap-2">
            <button class="btn btn-secondary">إلغاء</button>
            <button class="btn btn-warning">حفظ التغييرات</button>
        </div>

    </div>
</div>


<script src="js/script.js"></script>

</body>
</html>
